<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Login</title>
</head>

<body>
    <header>
        <nav>
            <span class="span-nav">NexaPlay</span>
            <div class="links">
                <a href="login.html">Entrar</a>
                <a class="btn-subscribe" href="#subscribe">Assine agora</a>
            </div>
        </nav>
    </header>

    <main>
        <form action="#" method="post" class="login-form">
            <h2>Entrar</h2>
            <label for="email"></label>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <label for="password"></label>
            <input type="password" name="password" id="password" placeholder="Senha" required>
            <div class="buttons-login">
                <button class="btn-subscribe btn" type="submit">Entrar</button>
                <button type="button" onclick="window.location.href='#'">Esqueceu a senha?</button>
            </div>
            <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
        </form>
    </main>

    <footer class="format-login-footer">
        <div class="login-footer">
            <a href="#">Em Breve</a>
            <a href="#">Filmes</a>
            <a href="#">Séries</a>
            <a href="#">Ajuda</a>
        </div>
        <div>
            <small>© 2026 NexaPlay. Todos os direitos reservados.</small>
        </div>
        <div class="social-media-login">
            <a href="#">
                <img src="assets/images/icon-facebook.svg" alt="Ícone do Facebook">
            </a>
            <a href="#">
                <img src="assets/images/icon-twitter.svg" alt="Ícone do Twitter">
            </a>
            <a href="#">
                <img src="assets/images/icon-instagram.png" alt="Ícone do Instagram">
            </a>
            <a href="#">
                <img src="assets/images/icon-youtube.svg" alt="Ícone do YouTube">
            </a>
        </div>
    </footer>

</body>

</html>
